<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lists</title>
    </head>
    <body>

        <!-- ol = ordered list → use when ORDER matters (steps, rankings) -->
        <ol>
            <li>Download the file</li>
            <li>Install dependencies</li>
            <li>Run the project</li>
        </ol>

        <!-- ul = unordered list → use when ORDER doesn't matter (menus, options) -->
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>

        <!-- li = list item → always goes inside ol or ul, never alone -->

    </body>
</html>
