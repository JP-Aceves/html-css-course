<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Links</title>
    </head>
    <body>

        <h1>A webpage with links</h1>
        <p>Welcome to the main page</p>

        <!-- Basic link → navigates in the same tab -->
        <a href="links2.html" title="Go to fruits page">Fruits</a>
        <a href="links3.html">Vegetables</a>

        <h2>External links</h2>

        <!-- target="_blank" → opens the link in a NEW tab -->
        <!-- rel="noopener noreferrer" → security best practice when using _blank -->
        <a href="links2.html" target="_blank" rel="noopener noreferrer">Fruits (new tab)</a>

    </body>
</html>
