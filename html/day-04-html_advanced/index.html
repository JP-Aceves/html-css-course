<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- International codification -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Adapt all devices to our site-->
    <title>Pagina de Ventas de Frutas</title>
    <link rel="stylesheet" href="styles.css"
    <meta name="description" content="Esta pagina es una tienda de venta de alimentos">
    <meta name="keywords" content="platano, fresa">
    <meta name="author" content="Jose Aceves">
    <meta name="robots" content="noarchive"> <!--There are different types (not recommended use) -->
    <meta name="OG: TITLE" content="Frutilandia"> <!--These are the usual in msgs when a link appears -->

</head>
<body>
    <!-- This is how you write a comment in HTML -->
       <!-- Learned how to put an icon (favicon), didn't actually worked this time -->
    <link rel="icon" href="logo.png" type="image/png">
    <form>
        <h2>Formulario de Contacto</h2>

                <!--Simple Inputs-->
        <fieldset>
            <legend>INFORMACIÓN BÁSICA</legend>
                    <div class="form_input">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" placeholder="Jose Aceves" id="nombre">
                    </div>
                    <div class="form_input">
                        <label for="email">Correo Electronico</label>
                        <input type="email" placeholder="aceves@hotmail.com" id="email">
                    </div>
                    
        </fieldset>
        <!-- Select & Option-->
            <div class="form_input">
                <label>Tipo de Usuario
                <select name="type-of-user">
                    <option value="user1">Seguidor</option>
                    <option value="user2">Empresa</option>
                    <option value="user3">Otros</option>
                </select>
                </label>
            </div>

         <!--Datalist & Option-->
        <div class="form_input">
            <label>Referente
                <input list="referente" name="referente">
                <datalist id="referente" name="type-of-user">
                    <option value="Aceves">Jefe</option>
                    <option value="Pablo">Asistente</option>
                    <option value="Adrian">Diseñador</option>
                </select>
            </label>
        </div>

          <!--TextArea-->
        <div>
            <div class="form_input">
                <label for="mensaje">Mensaje</label>
                <textarea placeholder="Hola, estoy interesado..." id="mensaje"></textarea> 
            </div>
        </div>
            <div class="form_input">
                <label for="checkbox">Acepto terminos y condiciones
                    <input type="checkbox" class="checkbox" id="checkbox"
            </div>
    </form>
</body>
</html>

<!-- The use of labels, fors and ids, can help make the iteraction better 
 because you literally asociate the input with the label-->
