<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Ventas de Frutas</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Esta pagina es una tienda de venta de alimentos">
    <meta name="keywords" content="platano, fresa">
    <meta name="author" content="Jose Aceves">
    <meta name="robots" content="noarchive">
    <meta name="OG: TITLE" content="Frutilandia">
  </head>
  <body>
    <link rel="icon" href="logo.png" type="image/png">
    <form>
      <h2>Formulario de Contacto</h2>

      <fieldset>
        <legend>INFORMACIÓN BÁSICA</legend>
        <div class="form_input">
          <label for="nombre">Nombre Completo</label>
          <input type="text" placeholder="Jose Aceves" id="nombre">
        </div>
        <div class="form_input">
          <label for="email">Correo Electronico</label>
          <input type="email" placeholder="aceves@hotmail.com" id="email">
        </div>
      </fieldset>

      <div class="form_input">
        <label>Tipo de Usuario
          <select name="type-of-user">
            <option value="user1">Seguidor</option>
            <option value="user2">Empresa</option>
            <option value="user3">Otros</option>
          </select>
        </label>
      </div>

      <div class="form_input">
        <label>Referente
          <input list="referente" name="referente">
          <datalist id="referente" name="type-of-user">
            <option value="Aceves">Jefe</option>
            <option value="Pablo">Asistente</option>
            <option value="Adrian">Diseñador</option>
          </datalist>
        </label>
      </div>

      <div class="form_input">
        <label for="mensaje">Mensaje</label>
        <textarea placeholder="Hola, estoy interesado..." id="mensaje"></textarea>
      </div>

      <div class="form_input">
        <label for="checkbox">Acepto los <a href="terms.html" target ="blank">terminos y condiciones</a>
          <input type="checkbox" class="checkbox" id="checkbox">
        </label>
      </div>
    </form>
  </body>
</html>
