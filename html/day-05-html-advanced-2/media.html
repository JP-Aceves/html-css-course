<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio & Video</title>
    <link rel="stylesheet" href="media.css">
  </head>
  <body>
    <!-- controls: shows the play/pause/volume bar
         autoplay: starts playing automatically when the page loads
         muted: starts muted (required by browsers to allow autoplay)
         loop: would repeat the video when it ends
         src: path to the video file -->
    <video controls autoplay muted src="video.mp4">
      Tu navegador no soporta el video
    </video>
  </body>
</html>
