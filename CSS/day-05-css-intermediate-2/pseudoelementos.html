<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 2026-04-06 — CSS Intermediate 2: Pseudo-elements -->
    <title>Day 05 — Pseudo-elements</title>
    <link rel="stylesheet" href="pseudoelementos.css" />
  </head>
  <body>

    <h1>Pseudo-elementos</h1>

    <!-- ::first-letter / ::first-line -->
    <p class="parrafo">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
      Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.
    </p>

    <!-- ::before / ::after -->
    <p class="precio">99</p>

    <!-- ::placeholder -->
    <input type="text" placeholder="Escribe tu nombre..." />

    <!-- ::selection -->
    <p class="seleccionable">Selecciona este texto con el mouse para ver el efecto.</p>

  </body>
</html>
